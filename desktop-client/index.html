<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifier</title>
    <link rel="stylesheet" href="style-dark-red.css">
</head>
<body>
    <div id="title-bar">
    <div id="title">Notifier Desktop</div>
    <div id="title-bar-btns">
        <button id="min-btn">－</button>
        <button id="max-btn">▢</button>
        <button id="close-btn">×</button>
    </div>
</div>
    <aside>
        <h1>Notifier</h1>
    </aside>
    <section>
        <header>
            <h2>Welcome to the best realtime notification system for businesses 🚀</h2>
        </header>
            <h3>Dashboard</h3>
            <div id="loginButtons">
                <button id="showLogin">Login</button>
                <button id="showSignup">Signup</button>
                <button id="logoutButton" style="display: none;">Logout</button>
            </div>
            <div id="loginForms">
                <div id="loginPage" style="display: none;">
                    <h3>Login</h3>
                    <input type="text" id="email" placeholder="Email">
                    <input type="password" id="password" placeholder="Password">
                    <button id="loginButton">Login</button>
                </div>
                <div id="signupPage" style="display: none;">
                    <h3>Signup</h3>
                    <input type="text" id="signupName" placeholder="Name">
                    <input type="text" id="signupSurname" placeholder="Surname">
                    <input type="text" id="signupEmail" placeholder="Email">
                    <input type="password" id="signupPassword" placeholder="Password">
                    <button id="signupButton">Signup</button>
                </div>
            </div>
            <div id="notificationSection" style="display: none;">
                <h3>Your Notifications</h3>
                <ul id="notificationList"></ul>
                <button id="loadNotifications">Wczytaj powiadomienia</button>
                <button onclick="showNotification()">Test notification</button>
            </div>
    </section>
    
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="renderer.js"></script>
</body>
</html>
